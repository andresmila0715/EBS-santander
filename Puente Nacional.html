<!-- ── FUNCIONES GLOBALES en <head> para que el iframe las encuentre ── -->
<script>
    var mapReady       = false;
    var pendingCmds    = [];
    var riskState      = { alto: true, medio: true, bajo: true, vacia: true };
    var originalStyles = new WeakMap();
    var allOn          = true;

    function onMapReady() {
        setTimeout(function() {
            var loader = document.getElementById('mapLoader');
            if (loader) loader.classList.add('gone');
            mapReady = true;
            pendingCmds.forEach(function(fn){ fn(); });
            pendingCmds = [];
            applyBase('terrain');
        }, 1000);
    }

    function sendToMap(fn) {
        if (mapReady) { fn(); } else { pendingCmds.push(fn); }
    }

    function getMap() {
        try { return document.getElementById('mapFrame').contentWindow.map; }
        catch(e) { return null; }
    }

    // ── Capa Base ─────────────────────────────────────────────
    function setBase(btn) {
        document.querySelectorAll('.base-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        applyBase(btn.dataset.base);
    }

    function applyBase(type) {
        sendToMap(function() {
            var m = getMap();
            if (!m) return;
            var layers    = m.getLayers().getArray();
            var idx       = CONFIG.layerIndex;
            var terrain   = layers[idx.terrain];
            var road      = layers[idx.road];
            var labels    = layers[idx.labels];
            var satellite = layers[idx.satellite];
            if (!terrain || !road || !satellite) return;
            terrain.setVisible(type === 'terrain');
            road.setVisible(type === 'road');
            if (labels) labels.setVisible(type === 'terrain' || type === 'road');
            satellite.setVisible(type === 'satellite');
        });
    }

    // ── Riesgo (por campo en features) ────────────────────────
    function toggleRisk(btn) {
        btn.classList.toggle('on');
        riskState[btn.dataset.risk] = btn.classList.contains('on');
        applyRiskStyleFilter();
    }

    function applyRiskStyleFilter() {
        sendToMap(function() {
            var m = getMap();
            if (!m) return;
            m.getLayers().forEach(function(topLayer) {
                processVectorLayer(topLayer);
                if (topLayer.getLayers) {
                    topLayer.getLayers().forEach(function(layer){ processVectorLayer(layer); });
                }
            });
            m.render();
        });
    }

    function processVectorLayer(layer) {
        if (!layer || !layer.getSource || !layer.setStyle) return;
        var src = layer.getSource();
        if (!src || !src.getFeatures) return;
        if (!originalStyles.has(layer)) {
            originalStyles.set(layer, layer.getStyle());
        }
        var origStyle = originalStyles.get(layer);
        var rv = CONFIG.riskValues;
        layer.setStyle(function(feature, resolution) {
            var riesgo = feature.get('RIESGO') || '';
            var cats = Object.keys(rv);
            for (var i = 0; i < cats.length; i++) {
                var cat = cats[i];
                if (rv[cat].indexOf(riesgo) !== -1) {
                    if (!riskState[cat]) return null;
                    break;
                }
            }
            return typeof origStyle === 'function' ? origStyle(feature, resolution) : origStyle;
        });
    }

    // ── Veredas — por popuplayertitle (capas individuales) ────
    function toggleVereda(btn) {
        btn.classList.toggle('on');
        applyVeredaFilter(btn.dataset.vereda, btn.classList.contains('on'));
    }

    function applyVeredaFilter(popupTitle, visible) {
        sendToMap(function() {
            var m = getMap();
            if (!m) return;
            m.getLayers().forEach(function(layer) {
                // Capas individuales (no grupos): comparar por popuplayertitle
                var pt = layer.get('popuplayertitle');
                if (pt && pt.trim() === popupTitle.trim()) {
                    layer.setVisible(visible);
                }
            });
        });
    }

    function toggleAllVeredas() {
        allOn = !allOn;
        document.querySelectorAll('.vereda-btn').forEach(function(btn) {
            allOn ? btn.classList.add('on') : btn.classList.remove('on');
            applyVeredaFilter(btn.dataset.vereda, allOn);
        });
    }

    // ── Menú hamburguesa ──────────────────────────────────────
    function toggleMenu() {
        document.querySelector('.menu-principal').classList.toggle('open');
        document.getElementById('hamburger').classList.toggle('open');
    }
</script>

        .all-btn { display: flex; align-items: center; justify-content: center; gap: 7px; padding: 9px; border-radius: 8px; background: var(--primary); color: white; border: none; cursor: pointer; font-size: 0.8rem; font-weight: 600; font-family: var(--font-body); margin-bottom: 8px; width: 100%; transition: background 0.18s, transform 0.15s; }
        .all-btn:hover { background: var(--primary-light); transform: translateY(-1px); }
        .vereda-btn { display: flex; align-items: center; gap: 9px; padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--border); background: #fafafa; cursor: pointer; font-size: 0.8rem; font-weight: 500; font-family: var(--font-body); color: var(--text); transition: all 0.16s; text-align: left; width: 100%; }
        .vereda-btn:hover { border-color: var(--primary-light); background: #f0f9ff; }
        .vereda-btn.on { border-color: var(--primary); background: #e0f2fe; color: var(--primary); }
        .vereda-btn.hidden { display: none; }
        .vereda-btn .v-icon { font-size: 1rem; flex-shrink: 0; }
        .vereda-btn .v-label { flex: 1; }
        .vereda-btn .v-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.18s; }
        .vereda-btn.on .v-dot { background: var(--primary); }

        /* MAPA */
        .map-zone { display: flex; flex-direction: column; animation: fadeIn 0.5s ease 0.2s both; }
        .map-container { position: relative; flex: 1; min-height: 600px; background: #d4e8ef; }
        .map-container iframe { width: 100%; height: 100%; min-height: 600px; border: none; display: block; }
        .map-loader { position: absolute; inset: 0; background: linear-gradient(135deg, #d4e8ef, #c8dde8); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 20; transition: opacity 0.5s; }
        .map-loader.gone { opacity: 0; pointer-events: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(0,95,115,0.18); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.85s linear infinite; }
        .loader-txt { font-size: 0.82rem; color: var(--primary); font-weight: 500; }

        /* ACCIONES */
        .action-link { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; text-decoration: none; transition: all 0.18s; margin-bottom: 7px; }
        .action-link.primary { border: 1.5px solid var(--primary); color: var(--primary); }
        .action-link.primary:hover { background: var(--primary); color: white; }
        .action-link.secondary { border: 1.5px solid var(--border); color: var(--text-muted); }
        .action-link.secondary:hover { background: #f1f5f9; color: var(--text); }

        /* FOOTER */
        footer { background: var(--primary-dark); color: rgba(255,255,255,0.45); padding: 14px 5%; display: flex; align-items: center; justify-content: space-between; font-size: 0.72rem; }
        footer a { color: rgba(255,255,255,0.45); text-decoration: none; transition: color 0.2s; }
        footer a:hover { color: rgba(255,255,255,0.85); }

        /* ANIMACIONES */
        @keyframes heroIn      { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slideInLeft { from { opacity:0; transform:translateX(-18px); } to { opacity:1; transform:translateX(0); } }
        @keyframes fadeIn      { from { opacity:0; } to { opacity:1; } }
        @keyframes spin        { to { transform:rotate(360deg); } }
        @keyframes pulse       { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.55;transform:scale(.82);} }

        /* RESPONSIVE */
        @media (max-width: 860px) {
            .hamburger { display: flex; }
            .menu-principal { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: var(--primary-dark); box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 999; }
            .menu-principal.open { display: flex; }
            nav { position: sticky; top: 0; flex-wrap: wrap; padding: 0 4%; }
            .menu-item { width: 100%; border-bottom: 1px solid rgba(255,255,255,0.08); }
            .menu-item > a { padding: 14px 16px; font-size: 0.95rem; }
            .menu-item > a::after { display: none; }
            .dropdown-content { display: none; position: static; background: rgba(0,0,0,0.2); border-radius: 0; border-top: none; border-left: 3px solid var(--accent); box-shadow: none; animation: none; }
            .dropdown-content.open { display: block; }
            .dropdown-content a { color: rgba(255,255,255,0.8) !important; padding: 10px 28px !important; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.85rem !important; }
            .dropdown-content a:hover { background: rgba(255,255,255,0.08) !important; padding-left: 34px !important; color: white !important; }
            .layout { grid-template-columns: 1fr; }
            .sidebar { position: static; max-height: 340px; overflow-y: auto; border-right: none; border-bottom: 2px solid var(--border); }
            .map-container, .map-container iframe { min-height: 50vh; }
            .hero { padding: 20px 4%; }
            .gov-bar { padding: 8px 4%; }
            .gov-bar img { height: 40px; }
        }
        @media (max-width: 600px) { .gov-bar-text { display: none; } }
        @media (max-width: 500px) { .hero h1 { font-size: 1.35rem; } .badge { font-size: 0.68rem; padding: 3px 8px; } }
    </style>
</head>
<body>

<div class="gov-bar">
    <img id="logo-img" alt="Logo organización">
    <span class="gov-bar-text" id="org-name"></span>
</div>

<nav>
    <ul class="menu-principal" id="menu-principal">
        <li class="menu-item"><a href="index.html">Inicio</a></li>
        <li class="menu-item"><a href="#">Territorios</a></li>
        <li class="menu-item">
            <a href="#" id="nav-cartografias">Cartografías ▾</a>
            <div class="dropdown-content" id="dd-cartografias"></div>
        </li>
        <li class="menu-item">
            <a href="#" id="nav-estadisticas">Estadísticas ▾</a>
            <div class="dropdown-content" id="dd-estadisticas"></div>
        </li>
        <li class="menu-item">
            <a href="#" id="nav-viviendas">Viviendas ▾</a>
            <div class="dropdown-content" id="dd-viviendas"></div>
        </li>
        <li class="menu-item"><a href="https://appebs.netlify.app/">Aplicaciones</a></li>
    </ul>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menú">
        <span></span><span></span><span></span>
    </button>
</nav>

<div class="hero">
    <div class="breadcrumb">
        <a href="index.html">Inicio</a> <span>›</span>
        <a href="#">Cartografías</a> <span>›</span>
        <span id="bc-municipio" style="color:rgba(255,255,255,0.85)"></span>
    </div>
    <h1>
        <em id="hero-sub"></em>
        <span id="hero-title"></span>
    </h1>
    <div class="hero-badges">
        <div class="badge"><div class="badge-dot"></div><span id="badge-año"></span></div>
        <div class="badge">📍 Santander, Colombia</div>
        <div class="badge" id="badge-veredas"></div>
    </div>
</div>

<div class="layout">
    <aside class="sidebar">

        <div class="sb-section">
            <div class="sb-title">Capa base</div>
            <div class="base-btns">
                <button class="base-btn" data-base="satellite" onclick="setBase(this)">
                    <span class="bicon">🛰️</span><span class="blabel">Satélite</span><span class="bcheck"></span>
                </button>
                <button class="base-btn active" data-base="terrain" onclick="setBase(this)">
                    <span class="bicon">🏔️</span><span class="blabel">Terreno</span><span class="bcheck"></span>
                </button>
                <button class="base-btn" data-base="road" onclick="setBase(this)">
                    <span class="bicon">🛣️</span><span class="blabel">Vías</span><span class="bcheck"></span>
                </button>
            </div>

        <div class="sb-section">
            <div class="sb-title">Veredas <span id="vereda-count" style="font-weight:400;color:var(--text-muted);font-size:0.65rem;margin-left:4px;"></span></div>
            <div class="vereda-btns" id="vereda-btns">
                <input type="text" class="vereda-search" id="vereda-search" placeholder="🔍 Buscar vereda…" oninput="filtrarVeredas(this.value)">
                <button class="all-btn" onclick="toggleAllVeredas()">🗺️ Activar / Desactivar todas</button>
            </div>
        </div>

        <div class="sb-section">
            <div class="sb-title">Acciones</div>
            <a id="action-open" href="#" target="_blank" class="action-link primary">🗺️ Abrir mapa completo</a>
            <a href="index.html" class="action-link secondary">← Volver al inicio</a>
        </div>

    </aside>

    <div class="map-zone">
        <div class="map-container">
            <div class="map-loader" id="mapLoader">
                <div class="spinner"></div>
                <div class="loader-txt" id="loader-txt">Cargando cartografía…</div>
            </div>
            <iframe id="mapFrame" title="Cartografía EBS+" allowfullscreen></iframe>
        </div>
    </div>
</div>

<footer>
    <span id="footer-copy"></span>
    <span>QGIS · qgis2web · OpenLayers</span>
    <a href="index.html">← Inicio</a>
</footer>

<!-- ── INICIALIZACIÓN DOM ─────────────────────────────────── -->
<script>
// Filtro de búsqueda de veredas
function filtrarVeredas(q) {
    var query = q.toLowerCase().trim();
    document.querySelectorAll('.vereda-btn').forEach(function(btn) {
        var label = btn.querySelector('.v-label').textContent.toLowerCase();
        btn.classList.toggle('hidden', query !== '' && label.indexOf(query) === -1);
    });
}

document.addEventListener('DOMContentLoaded', function() {
    var C = CONFIG;
    var mapSrc = C.qgisFolder + '/index.html';

    // Título
    document.title = 'Cartografía · ' + C.municipio + ' · ' + C.orgShort;

    // Gov bar
    document.getElementById('logo-img').src = C.logoSrc;
    document.getElementById('org-name').textContent = C.orgName;

    // Hero
    document.getElementById('bc-municipio').textContent = C.municipio;
    document.getElementById('hero-sub').textContent     = 'Cartografía · ' + C.orgShort + ' ' + C.año;
    document.getElementById('hero-title').textContent   = 'Municipio de ' + C.municipio;
    document.getElementById('badge-año').textContent    = 'Mapa activo · ' + C.año;
    document.getElementById('badge-veredas').textContent = '🏠 ' + C.veredas.length + ' veredas';

    // Iframe
    var frame = document.getElementById('mapFrame');
    frame.onload = function() { onMapReady(); };
    frame.src = mapSrc;

    document.getElementById('loader-txt').textContent = 'Cargando cartografía de ' + C.municipio + '…';
    document.getElementById('action-open').href = mapSrc;
    document.getElementById('footer-copy').textContent = '© ' + C.año + ' ' + C.orgShort + ' · Castillo';

    // Dropdowns del menú
    var seccionesMap = {
        'dd-cartografias': 'cartografias',
        'dd-estadisticas': 'estadisticas',
        'dd-viviendas':    'viviendas',
        'dd-aplicaciones': 'aplicaciones',
    };
    Object.keys(seccionesMap).forEach(function(ddId) {
        var seccion = seccionesMap[ddId];
        var dd      = document.getElementById(ddId);
        var lista   = C.menuMunicipios[seccion] || [];
        dd.innerHTML = lista.map(function(m) {
            var esPaginaActual = (m.label === C.municipio && seccion === C.seccionActiva);
            return '<a href="' + m.href + '"' + (esPaginaActual ? ' class="active-page"' : '') + '>' + m.label + '</a>';
        }).join('');
    });

    // Sección activa en el nav
    var navIds = {
        'cartografias': 'nav-cartografias',
        'estadisticas': 'nav-estadisticas',
        'viviendas':    'nav-viviendas',
        'aplicaciones': 'nav-aplicaciones',
    };
    var activeEl = document.getElementById(navIds[C.seccionActiva]);
    if (activeEl) activeEl.classList.add('active');

    // Botones de veredas dinámicos
    var vBtns   = document.getElementById('vereda-btns');
    var countEl = document.getElementById('vereda-count');
    if (countEl) countEl.textContent = '(' + C.veredas.length + ')';

    C.veredas.forEach(function(v) {
        var btn = document.createElement('button');
        btn.className        = 'vereda-btn on';
        btn.dataset.vereda   = v.id;
        btn.onclick          = function() { toggleVereda(this); };
        btn.innerHTML        = '<span class="v-icon">' + v.icon + '</span>'
                             + '<span class="v-label">' + v.label + '</span>'
                             + '<span class="v-dot"></span>';
        vBtns.appendChild(btn);
    });

    // Dropdowns táctiles en móvil
    document.querySelectorAll('.menu-item > a').forEach(function(link) {
        link.addEventListener('click', function(e) {
            if (window.innerWidth > 860) return;
            var dd = this.parentElement.querySelector('.dropdown-content');
            if (!dd) return;
            e.preventDefault();
            dd.classList.toggle('open');
        });
    });

    // Cerrar menú al hacer clic fuera
    document.addEventListener('click', function(e) {
        if (!e.target.closest('nav')) {
            var menu = document.querySelector('.menu-principal');
            var ham  = document.getElementById('hamburger');
            if (menu) menu.classList.remove('open');
            if (ham)  ham.classList.remove('open');
        }
    });
});
</script>
</body>
</html>
